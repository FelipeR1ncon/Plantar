<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#FBF8EA">
<title>Producto — Plantar</title>
<meta name="description" content="Ficha de producto Plantar: presentaciones, ingredientes e información nutricional.">
<link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@400;600;800&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-page="products">

<header class="site-header" id="site-header"></header>

<section class="detail-hero">
  <div class="container inner" id="detailHero"></div>
</section>

<div data-marquee=""></div>

<section class="section band-cream" id="specsSection" style="display:none">
  <div class="container" style="max-width:820px">
    <div class="section-head center">
      <h2 class="section-title" style="font-size:clamp(2rem,4vw,3rem)" data-i18n="detail_specs"></h2>
    </div>
    <div class="spec-wrap rev"><table class="spec-table" id="specTable"></table></div>
  </div>
</section>

<section class="section band-white related">
  <div class="container">
    <h2 class="section-title" style="font-size:clamp(2rem,4vw,3rem)" data-i18n="related_title"></h2>
    <div class="prod-grid" id="relatedGrid" style="margin-top:1.6rem"></div>
    <div style="margin-top:2rem"><a class="btn btn-outline" href="productos.html" data-i18n="back_catalog"></a></div>
  </div>
</section>

<footer class="site-footer" id="site-footer"></footer>

<script src="assets/js/data.js"></script>
<script src="assets/js/main.js"></script>
<script>
function specRow(label, value) {
  return value ? `<tr><td>${label}</td><td>${value}</td></tr>` : '';
}

function renderPage() {
  const id = new URLSearchParams(location.search).get('id');
  const p = findProduct(id) || PRODUCTS[0];
  document.title = `${prodName(p)} — Plantar`;

  const waMsg = (LANG === 'en'
    ? `Hello Plantar 👋, I would like a quote for: ${prodName(p)}`
    : `Hola Plantar 👋, quisiera cotizar: ${prodName(p)}`);

  const imgs = [...new Set([p.empaque, p.image].filter(Boolean))];
  document.getElementById('detailHero').innerHTML = `
    <div class="art rev">
      <div class="gallery">
        ${imgs.length > 1 ? `<button type="button" class="g-arrow prev" aria-label="Anterior">‹</button>` : ''}
        <img id="mainImg" src="${imgs[0]}" alt="${prodName(p)}">
        ${imgs.length > 1 ? `<button type="button" class="g-arrow next" aria-label="Siguiente">›</button>` : ''}
      </div>
    </div>
    <div class="rev">
      <span class="chip" style="background:var(--yellow)">${t('cat_' + p.category)}</span>
      <h1 style="margin-top:0.6rem">${prodName(p)}</h1>
      <p class="desc">${prodDesc(p)}</p>
      ${p.sizes ? `<div style="margin-bottom:1.2rem">
        <strong style="text-transform:uppercase;font-size:0.78rem;letter-spacing:0.06em">${t('detail_presentations')}</strong>
        <div class="chip-row" style="margin-top:0.4rem">${p.sizes.split(',').map(s => `<span class="chip">${s.trim()}</span>`).join('')}</div>
      </div>` : ''}
      <div class="cta-row" style="display:flex;gap:1rem;flex-wrap:wrap">
        <a class="btn btn-dark" href="contacto.html?producto=${p.id}">${t('detail_quote')}</a>
        <a class="btn btn-wa" target="_blank" rel="noopener" href="${waLink(waMsg)}">${t('detail_wa')}</a>
      </div>
    </div>`;

  // Galería con flechas
  if (imgs.length > 1) {
    let gi = 0;
    const show = d => {
      gi = (gi + d + imgs.length) % imgs.length;
      document.getElementById('mainImg').src = imgs[gi];
    };
    document.querySelector('.g-arrow.prev').addEventListener('click', () => show(-1));
    document.querySelector('.g-arrow.next').addEventListener('click', () => show(1));
  }

  // Ficha técnica
  const info = p.info;
  if (info) {
    document.getElementById('specsSection').style.display = '';
    document.getElementById('specTable').innerHTML = [
      specRow(t('spec_ref'), info.pt),
      specRow(t('spec_weight'), info.peso + (info.oz ? ` (${info.oz} oz)` : '')),
      specRow(t('spec_box'), info.undCaja),
      specRow(t('spec_measures'), info.medidas),
      specRow(t('spec_ingredients'), info.ingredientes),
      specRow(t('spec_oil'), info.aceite),
      specRow(t('spec_flavor'), info.saborizantes),
      specRow(t('spec_cal'), info.calorias ? info.calorias + ' Kcal' : ''),
      specRow(t('spec_fat'), info.grasaSat),
      specRow(t('spec_sodium'), info.sodio),
      specRow(t('spec_sugar'), info.azucares),
      specRow(t('spec_extra'), info.extras),
    ].join('');
  } else {
    document.getElementById('specsSection').style.display = 'none';
  }

  // Relacionados: misma categoría
  const related = PRODUCTS.filter(x => x.category === p.category && x.id !== p.id).slice(0, 4);
  const fill = related.length < 4
    ? [...related, ...PRODUCTS.filter(x => x.id !== p.id && !related.includes(x)).slice(0, 4 - related.length)]
    : related;
  document.getElementById('relatedGrid').innerHTML = fill.map(cardHTML).join('');
}
</script>
</body>
</html>
