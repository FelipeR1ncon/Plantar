<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contacto — Plantar | Cotiza Nuestros Snacks</title>
<meta name="description" content="Contacta al equipo de ventas de Plantar: cotizaciones de snacks de plátano, yuca, papa y maquila de marca privada. WhatsApp, correo y teléfono.">
<link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@400;600;800&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-page="contact">

<header class="site-header" id="site-header"></header>

<section class="section band-lime" style="padding-bottom:2.5rem;border-bottom:3px solid var(--dark)">
  <div class="container">
    <span class="kicker" data-i18n="nav_contact"></span>
    <h1 class="section-title" style="font-size:clamp(3rem,7vw,5.2rem)" data-i18n="contact_title"></h1>
    <p class="section-sub" style="margin-top:0.6rem" data-i18n="contact_sub"></p>
  </div>
</section>

<div data-marquee=""></div>

<section class="section band-cream">
  <div class="container contact-grid">
    <!-- Datos de contacto -->
    <div class="rev">
      <div class="contact-card">
        <h3 data-i18n="contact_sales"></h3>
        <a href="mailto:ventasnacionales@plantarsas.com">ventasnacionales@plantarsas.com</a>
      </div>
      <div class="contact-card">
        <h3 data-i18n="contact_reception"></h3>
        <a href="mailto:recepcion@plantarsas.com">recepcion@plantarsas.com</a>
      </div>
      <div class="contact-card">
        <h3 data-i18n="contact_phones"></h3>
        <div>(+57) 310 643 77 45</div>
        <div>(+57) 314 431 56 79</div>
      </div>
      <div class="contact-card">
        <h3 data-i18n="contact_address"></h3>
        <div id="addr"></div>
      </div>
      <a class="btn btn-wa" id="waCta" target="_blank" rel="noopener" data-i18n="contact_wa_cta"></a>
    </div>

    <!-- Formulario -->
    <form class="quote-form rev" id="quoteForm">
      <h2 class="section-title" style="font-size:clamp(1.8rem,3.5vw,2.6rem)" data-i18n="form_title"></h2>
      <label for="fName" data-i18n="form_name"></label>
      <input id="fName" type="text" autocomplete="name">
      <label for="fCompany" data-i18n="form_company"></label>
      <input id="fCompany" type="text" autocomplete="organization">
      <label for="fEmail" data-i18n="form_email"></label>
      <input id="fEmail" type="email" autocomplete="email">
      <label for="fPhone" data-i18n="form_phone"></label>
      <input id="fPhone" type="tel" autocomplete="tel">
      <label data-i18n="form_products"></label>
      <div class="prod-check" id="prodCheck"></div>
      <label for="fMsg" data-i18n="form_msg"></label>
      <textarea id="fMsg" data-i18n-ph="form_msg_ph"></textarea>
      <div class="form-actions">
        <button type="button" class="btn btn-wa" id="sendWa" data-i18n="form_send_wa"></button>
        <button type="button" class="btn btn-outline" id="sendMail" data-i18n="form_send_mail"></button>
      </div>
      <p class="form-note" data-i18n="form_note"></p>
    </form>
  </div>
</section>

<footer class="site-footer" id="site-footer"></footer>

<script src="assets/js/data.js"></script>
<script src="assets/js/main.js"></script>
<script>
function buildMessage() {
  const v = id => document.getElementById(id).value.trim();
  const prods = [...document.querySelectorAll('#prodCheck input:checked')].map(c => c.dataset.name);
  const L = LANG === 'en';
  const lines = [
    L ? 'Hello Plantar 👋, I would like a quote.' : 'Hola Plantar 👋, quisiera una cotización.',
    v('fName') && `${L ? 'Name' : 'Nombre'}: ${v('fName')}`,
    v('fCompany') && `${L ? 'Company' : 'Empresa'}: ${v('fCompany')}`,
    v('fEmail') && `${L ? 'Email' : 'Correo'}: ${v('fEmail')}`,
    v('fPhone') && `${L ? 'Phone' : 'Teléfono'}: ${v('fPhone')}`,
    prods.length && `${L ? 'Products' : 'Productos'}: ${prods.join(', ')}`,
    v('fMsg') && `${L ? 'Message' : 'Mensaje'}: ${v('fMsg')}`,
  ].filter(Boolean);
  return lines.join('\n');
}

function validForm() {
  const name = document.getElementById('fName').value.trim();
  const msg = document.getElementById('fMsg').value.trim();
  const prods = document.querySelectorAll('#prodCheck input:checked').length;
  if (!name || (!msg && !prods)) { alert(t('form_required')); return false; }
  return true;
}

function renderPage() {
  document.getElementById('addr').textContent = CONTACT.address;
  document.getElementById('waCta').href = waLink();

  // checklist de productos
  const pre = new URLSearchParams(location.search).get('producto');
  document.getElementById('prodCheck').innerHTML = PRODUCTS.map(p =>
    `<label><input type="checkbox" data-name="${prodName(p)}" ${p.id === pre ? 'checked' : ''}> ${prodName(p)}</label>`
  ).join('');

  document.getElementById('sendWa').onclick = () => {
    if (!validForm()) return;
    window.open(waLink(buildMessage()), '_blank');
  };
  document.getElementById('sendMail').onclick = () => {
    if (!validForm()) return;
    const subject = LANG === 'en' ? 'Quote request — Plantar website' : 'Solicitud de cotización — sitio web Plantar';
    location.href = `mailto:ventasnacionales@plantarsas.com?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(buildMessage())}`;
  };
}
</script>
</body>
</html>
