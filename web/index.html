<script>
function renderPage() {
  // 8 productos destacados variados
  const picks = ['toston-de-platano-verde', 'tajadas-de-platano-maduro', 'maduritos-picante-habanero',
    'platanitos-queso-explosion', 'toston-de-yuca', 'papa-trufa', 'snacks-mix', 'toston-de-limon'];
  const feats = picks.map(id => findProduct(id)).filter(Boolean);
  const list = feats.length >= 6 ? feats : PRODUCTS.slice(0, 8);
  document.getElementById('featuredGrid').innerHTML = list.map(cardHTML).join('');

  document.getElementById('homeCountries').innerHTML = CFG.global.countries.map(c =>
    `<span class="country" style="background:var(--paper)"><span class="dot" style="background:${c.color}"></span>${c.name}</span>`
  ).join('');

  initHeroCarousel();
}

// Carrusel de empaques en el hero
let heroCarouselTimer = null;
function initHeroCarousel() {
  const bag = document.getElementById('heroBag');
  if (!bag || heroCarouselTimer) return;
  const bags = [
    'assets/img/toston-verde.png',
    'assets/img/toston-maduro.png',
    'assets/img/maduritos.png',
    'assets/img/platanitos-queso-explosion.png',
    'assets/img/all-mix.png',
    'assets/img/moneda-verde.png',
    'assets/img/papa-trufa-2.png',
    'assets/img/mix-vegetal.png',
  ];
  bags.forEach(src => { const i = new Image(); i.src = src; }); // precarga
  let bi = 0;
  heroCarouselTimer = setInterval(() => {
    bi = (bi + 1) % bags.length;
    bag.classList.add('fade-out');
    setTimeout(() => {
      bag.src = bags[bi];
      bag.classList.remove('fade-out');
    }, 450);
  }, 3200);
}
</script>
