<script>
const TIMELINE_EN = {
  '2009': ['Our company is born!', 'The beginning of a big dream.'],
  '2011': ['First client', 'We started operations with our first client, expanding throughout Colombia.'],
  '2017': ['Coffee Region', 'We moved to the Coffee Region, in La Tebaida, Quindío.'],
  '2018': ['First export', 'We crossed borders with our first export to the United States and opened a second production plant.'],
  '2019': ['International expansion', 'We expanded our international presence with exports to Spain, Panama and the Dominican Republic.'],
  '2020': ['Growth', 'Our team grew to 320 employees, we opened a new distribution center and strengthened alliances with our suppliers.'],
  '2023': ['Corporate unification', 'We unified our corporate name.'],
};

function renderPage() {
  document.getElementById('timeline').innerHTML = CFG.legacy.timeline.map(x => {
    const en = TIMELINE_EN[x.year];
    const title = LANG === 'en' && en ? en[0] : x.title;
    const desc = LANG === 'en' && en ? en[1] : x.desc;
    return `<div class="tl-item rev"><div class="year">${x.year}</div><h3>${title}</h3><p>${desc}</p></div>`;
  }).join('');

  document.getElementById('sellos').innerHTML = CFG.capacity.certificaciones.sellos.map(s =>
    `<div class="sello"><div><img src="${s.img}" alt="${s.name}"><span>${s.name}</span></div></div>`
  ).join('');

  buildMap();
}

/* ---- Mapa interactivo: pines, líneas desde Colombia y leyenda clicable ---- */
// Coordenadas (%) calibradas por centroide de píxeles verdes de assets/img/mapa.jpg
const MAP_POS = [
  { id: 'ca', x: 23.8, y: 29.3 }, { id: 'us', x: 25, y: 47.8 }, { id: 'mx', x: 25.4, y: 52.9 },
  { id: 'do', x: 29.3, y: 57.2 }, { id: 'pr', x: 34.6, y: 57.9 }, { id: 'pa', x: 32.3, y: 63.2 },
  { id: 'co', x: 33.5, y: 65.3 }, { id: 'gb', x: 46.4, y: 43.9 }, { id: 'ch', x: 49.4, y: 48.7 },
  { id: 'es', x: 46.1, y: 52.7 }, { id: 'au', x: 16.9, y: 82.1 },
];
const CO_ORIGIN = { x: 33.5, y: 65.3 };
let activeCountry = -1;

function buildMap() {
  const countries = CFG.global.countries;
  let html = '';
  MAP_POS.forEach((pos, i) => {
    const c = countries.find(ct => ct.id === pos.id);
    if (!c) return;
    if (pos.id !== 'co') {
      const dx = pos.x - CO_ORIGIN.x, dy = pos.y - CO_ORIGIN.y;
      const len = Math.sqrt(dx * dx + dy * dy);
      const angle = Math.atan2(dy, dx) * 180 / Math.PI;
      html += `<div class="map-line" data-mapline="${i}" style="left:${CO_ORIGIN.x}%;top:${CO_ORIGIN.y}%;width:${len}%;transform:rotate(${angle}deg);background:${c.color}"></div>`;
    }
    html += `<div class="map-pin" data-mappin="${i}" style="left:${pos.x}%;top:${pos.y}%;background:${c.color};color:${c.color};" role="button" tabindex="0" aria-label="${c.name}">
      <span class="map-pin-label">${c.name}</span></div>`;
  });
  document.getElementById('mapOverlay').innerHTML = html;

  document.getElementById('countries').innerHTML = MAP_POS.map((pos, i) => {
    const c = countries.find(ct => ct.id === pos.id);
    return c ? `<button type="button" class="country" data-maplegend="${i}"><span class="dot" style="background:${c.color}"></span>${c.name}</button>` : '';
  }).join('');

  setTimeout(() => document.querySelectorAll('.map-line').forEach(l => l.classList.add('visible')), 400);

  document.querySelectorAll('[data-mappin]').forEach(p => {
    p.addEventListener('click', () => highlightCountry(+p.dataset.mappin));
    p.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); highlightCountry(+p.dataset.mappin); } });
  });
  document.querySelectorAll('[data-maplegend]').forEach(b =>
    b.addEventListener('click', () => highlightCountry(+b.dataset.maplegend)));
}

function highlightCountry(idx) {
  const pins = document.querySelectorAll('.map-pin');
  const legends = document.querySelectorAll('[data-maplegend]');
  const lines = document.querySelectorAll('.map-line');
  if (activeCountry === idx) {
    activeCountry = -1;
    pins.forEach(p => p.classList.remove('active'));
    legends.forEach(l => l.classList.remove('active'));
    lines.forEach(l => { l.style.opacity = ''; });
    return;
  }
  activeCountry = idx;
  pins.forEach(p => p.classList.toggle('active', +p.dataset.mappin === idx));
  legends.forEach(l => l.classList.toggle('active', +l.dataset.maplegend === idx));
  lines.forEach(l => { l.style.opacity = +l.dataset.mapline === idx ? '0.85' : '0.12'; });
}
</script>
